services:
  strapi:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: postgres
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: fU53YmzYXQnf5lmxIrO6rbeqSskiJqcvEL67APxBlpNXGcN1zAKYt7Kv24OlDmJL
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1338
    volumes:
      - ./config:/app/config
      - ./src:/app/src
      - ./public/uploads:/app/public/uploads
    ports:
      - "1338:1338"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.strapi.rule=Host(`liftlegalwp.com.au`)"
      - "traefik.http.routers.strapi.entrypoints=websecure"
      - "traefik.http.routers.strapi.tls=true"
      - "traefik.http.services.strapi.loadbalancer.server.port=1338"

networks:
  coolify:
    external: true
