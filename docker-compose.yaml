version: "3"

services:
  strapi:
    build: .
    image: strapi:latest
    restart: unless-stopped
    env_file: ./.env
    environment:
      DATABASE_CLIENT: postgres
      # Use the actual Postgres container name here for internal Docker network DNS resolution:
      DATABASE_HOST: swgokoggckkc44cs8s8wc4so
      DATABASE_PORT: 5432
      DATABASE_NAME: postgresql
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: fU53YmzYXQnf5lmxIrO6rbeqSskiJqcvEL67APxBlpNXGcN1zAKYt7Kv24OlDmJL
      NODE_ENV: production
    volumes:
      - ./config:/app/config
      - ./src:/app/src
      - ./public/uploads:/app/public/uploads
    ports:
      - "1337:1337"
    depends_on:
      - postgres # remove if Postgres is managed outside this compose

# No postgres service here because you said Coolify manages it externally.

