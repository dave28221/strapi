version: '3.8'

services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     strapiuser
      POSTGRES_PASSWORD: tkNHJhXLNDS5GcRbH61DDSkQ6chE17SHgQprn8ghlsq1P6hUQlQTydF11cQajPt2
      POSTGRES_DB:       strapi            # ← match this to DATABASE_NAME below
    volumes:
      - db_data:/var/lib/postgresql/data

  strapi:
    build: .
    depends_on:
      - db
    ports:
      - '1337:1337'
    environment:
      DATABASE_CLIENT:   postgres
      DATABASE_HOST:     db                # ← use the service name
      DATABASE_PORT:     5432
      DATABASE_NAME:     strapi            # ← match POSTGRES_DB above
      DATABASE_USERNAME: strapiuser
      DATABASE_PASSWORD: tkNHJhXLNDS5GcRbH61DDSkQ6chE17SHgQprn8ghlsq1P6hUQlQTydF11cQajPt2
      NODE_ENV:          production
    volumes:
      - ./public:/app/public

volumes:
  db_data:
